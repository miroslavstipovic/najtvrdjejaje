services:
  postgres:
    image: postgres:15
    container_name: najtvrdje_jaje_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: najtvrdje_jaje
      POSTGRES_USER: jaje_user
      POSTGRES_PASSWORD: tvrdo_jaje_2024
      POSTGRES_ROOT_PASSWORD: tvrdo_jaje_2024
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    platform: linux/amd64
    container_name: najtvrdje_jaje_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@najtvrdjejaje.com
      PGADMIN_DEFAULT_PASSWORD: tvrdo_jaje_2024
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "8081:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
